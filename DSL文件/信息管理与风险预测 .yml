    - data:
        code: "function main(param) {\n  const sex = param.sex;\n  const height =\
          \ param.height;\n  const weight = param.weight;\n  const age = param.age;\n\
          \  const systolicPressure = param.systolicPressure;\n  const bmi = weight\
          \ / ((height / 100) * (height / 100));\n  let waistline;\n  if (sex ===\
          \ '男') {\n    waistline = height * 0.3 + weight * 0.1 - age * 0.1 + 8;\n\
          \  } else {\n    waistline = height * 0.3 + weight * 0.1 - age * 0.1 + 5;\n\
          \  }\n  let sp = systolicPressure;\n  if (sp == null || sp === 0) {\n  \
          \  if (sex === '男') {\n      sp = bmi < 24 ? 115 : (bmi < 28 ? 125 : 135);\n\
          \    } else {\n      sp = bmi < 24 ? 110 : (bmi < 28 ? 120 : 130);\n   \
          \ }\n  }\n  return {\n    bmi: Number(bmi.toFixed(1)),\n    waistline: Number(waistline.toFixed(1)),\n\
          \    systolicPressure: Number(sp.toFixed(1))\n  };\n}\n"
        code_language: javascript
        desc: 计算BMI并估算腰围、收缩压
