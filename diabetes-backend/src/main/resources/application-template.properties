# ============================================================
# 配置模板（占位符版）——公开仓库安全
# 实际运行请复制本文件为 application.properties，并填入真实值
# application.properties 已被 .gitignore 忽略，不会提交
# ============================================================

spring.application.name=diabetes-assistant

server.port=8090
server.servlet.context-path=/diabetes

logging.level.com.diabetes.mapper=debug

# MySQL 数据库（请改成你的本地配置）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/diabetes_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.diabetes.entity
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt.secret=YOUR_JWT_SECRET
jwt.expiration=86400000

# Dify 配置（本地 Dify 地址，按实际端口填写；3 个应用各有独立 key）
dify.api-url=http://127.0.0.1:8085/v1
# 智能助手（chat 应用）
dify.api-key=app-YOUR_CHAT_KEY
# 风险预测（workflow 应用）
dify.risk-api-key=app-YOUR_RISK_KEY
# 赵晓峰医生（chat 应用）
dify.doctor-api-key=app-YOUR_DOCTOR_KEY
